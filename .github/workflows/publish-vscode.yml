name: Publish to VS Code Marketplace

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npx @vscode/vsce package -o patina-theme.vsix

      - run: npx @vscode/vsce publish --packagePath patina-theme.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
