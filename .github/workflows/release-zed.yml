name: Release to Zed Extensions

# Auto-publish on tags is disabled until the first-add PR
# (zed-industries/extensions#6470) is merged. The bump action only updates an
# existing registry entry, so it fails on every tag until Patina is in the
# registry. Re-add the `push: tags` trigger once #6470 is merged; until then
# run this manually via workflow_dispatch.
on:
  workflow_dispatch:

jobs:
  release:
    name: Open Zed extensions PR
    runs-on: ubuntu-latest
    steps:
      - uses: huacnlee/zed-extension-action@v2
        with:
          extension-name: patina-theme
          push-to: lmarkmann/extensions
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
